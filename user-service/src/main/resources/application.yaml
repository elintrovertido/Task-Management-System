spring:
  application:
    name: user-service
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: user-service
        health-check-path: /USER-SERVICE/actuator/health
        health-check-interval: 10s
        prefer-ip-address: true

  data:
    mongodb:
      host: localhost
      port: 27017
      database: user-service

    redis:
      host: localhost
      port: 6379

server:
  port: 8081
  servlet:
    context-path: /USER-SERVICE

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
