spring:
  application:
    name: task-service
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: task-service
        health-check-path: /TASK-SERVICE/actuator/health
        health-check-interval: 10s
        prefer-ip-address: true
  data:
    mongodb:
      host: localhost
      port: 27017
      database: task-service

server:
  port: 8083
  servlet:
    context-path: /TASK-SERVICE

logging:
  level:
    root: INFO

jwt:
  secret: dGFzay1tYW5hZ2VtZW50LXN5c3RlbS1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2g=
  # This is a Base64 encoded key. Generate a proper one for production:
  # openssl rand -base64 32
