spring:
  application:
    name: project-service
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: project-service
        enabled: true
        health-check-path: /PROJECT-SERVICE/actuator/health
        health-check-interval: 10s
        prefer-ip-address: true
  data:
    mongodb:
      host: localhost
      port: 27017
      database: project-service
    redis:
      host: localhost
      port: 6379

server:
  port: 8082
  servlet:
    context-path: /PROJECT-SERVICE

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO

jwt:
  secret: dGFzay1tYW5hZ2VtZW50LXN5c3RlbS1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2g=
  # This is a Base64 encoded key. Generate a proper one for production:
  # openssl rand -base64 32

